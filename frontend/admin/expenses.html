<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dépenses — StockLedger</title>
    <link rel="icon" type="image/png" href="../stockeledeger.png">
    <link rel="stylesheet" href="../app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app-layout">

    <aside class="sidebar">
        <div class="logo">
            <img src="../stockeledeger.png" alt="Logo" class="sidebar-logo"> StockLedger
        </div>
        <nav>
            <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="products.html"><i class="fa-solid fa-boxes-stacked"></i> Produits</a>
            <a href="expenses.html" class="active"><i class="fa-solid fa-money-bill-wave"></i> Dépenses</a>
            <a href="orders.html"><i class="fa-solid fa-receipt"></i> Commandes</a>
            <a href="../caissier/pos.html"><i class="fa-solid fa-cash-register"></i> Caisse</a>
        </nav>
        <div class="logout"><button id="logout-btn">Déconnexion</button></div>
    </aside>

    <div class="main">
        <div class="topbar">
            <h2>Dépenses</h2>
            <span class="user-info" id="user-info"></span>
        </div>
        <div class="content">

            <div class="stat-grid" style="margin-bottom:1.2rem">
                <div class="stat-card">
                    <div class="label">Total ce mois</div>
                    <div class="value red" id="total-expenses">—</div>
                </div>
                <div class="stat-card">
                    <div class="label">Nombre de dépenses</div>
                    <div class="value blue" id="count-expenses">—</div>
                </div>
            </div>

            <div class="card" style="margin-bottom:1.2rem">
                <div class="section-title"><i class="fa-solid fa-plus"></i> Enregistrer une dépense</div>
                <form id="expense-form">
                    <div class="form-row">
                        <input type="text" name="label" placeholder="Libellé (ex: Loyer, Salaire, Électricité…)" required>
                        <input type="number" name="amount" placeholder="Montant (FCFA)" min="0" step="1" required>
                        <button type="submit" class="btn-add">Enregistrer</button>
                    </div>
                </form>
            </div>

            <div class="card">
                <div class="section-title"><i class="fa-solid fa-list"></i> Historique des dépenses</div>
                <table>
                    <thead>
                        <tr><th>Libellé</th><th>Montant</th><th>Date</th></tr>
                    </thead>
                    <tbody id="expenses-table">
                        <tr><td colspan="3" style="color:var(--muted)">Chargement…</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="expenses.js"></script>
</body>
</html>
