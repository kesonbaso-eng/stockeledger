<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique — StockLedger</title>
    <link rel="icon" type="image/png" href="../stockeledeger.png">
    <link rel="stylesheet" href="../app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app-layout">

    <aside class="sidebar">
        <div class="logo">
            <img src="../stockeledeger.png" alt="Logo" class="sidebar-logo"> StockLedger
        </div>
        <nav>
            <a href="pos.html"><i class="fa-solid fa-cash-register"></i> Caisse</a>
            <a href="history.html" class="active"><i class="fa-solid fa-clock-rotate-left"></i> Historique</a>
        </nav>
        <div class="logout">
            <button id="logout-btn">Déconnexion</button>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <h2>Historique des ventes</h2>
            <span class="user-info" id="user-info"></span>
        </div>
        <div class="content">
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date</th>
                            <th>Articles</th>
                            <th>Total</th>
                            <th>Statut</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table">
                        <tr><td colspan="5" style="color:var(--muted)">Chargement…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay hidden" id="detail-modal">
    <div class="modal">
        <h3>Détail de la commande</h3>
        <div id="detail-content"></div>
        <div class="modal-actions">
            <button class="btn-cancel" id="close-detail">Fermer</button>
            <button class="btn-add" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Imprimer
            </button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="history.js"></script>
</body>
</html>
