<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — StockLedger</title>
    <link rel="icon" type="image/png" href="stockeledeger.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <img src="/frontend/stockeledger.png" alt="Logo StockLedger">
            <h1>StockLedger</h1>
        </div>
        <p class="subtitle">Connexion</p>

        <div id="error-msg" class="msg error hidden"></div>

        <form id="login-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="votre@email.com" required>
            </div>
            <div class="field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="field forgot">
                <a href="#">Mot de passe oublié ?</a>
            </div>
            <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        <div class="divider"><span>ou</span></div>
        <button class="btn-google" id="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18">
            Continuer avec Google
        </button>

        <p class="switch-link">Pas encore de compte ? <a href="register.html">S'inscrire</a></p>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
