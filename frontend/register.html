<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte — StockLedger</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <img src="stockeledeger.png" alt="Logo StockLedger">
            <h1>StockLedger</h1>
        </div>
        <p class="subtitle">Créer un compte</p>

        <div id="error-msg" class="msg error hidden"></div>
        <div id="success-msg" class="msg success hidden"></div>

        <form id="register-form">
            <div class="field">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" placeholder="ex: boutique_ali" required>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="votre@email.com" required>
            </div>
            <div class="field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="field">
                <label for="confirm-password">Confirmer le mot de passe</label>
                <input type="password" id="confirm-password" name="confirm_password" placeholder="••••••••" required>
            </div>
            <div class="field checkbox-field">
                <input type="checkbox" id="policy" name="policy" required>
                <label for="policy">J'accepte la <a href="policy.html">politique de confidentialité</a></label>
            </div>
            <button type="submit" class="btn-primary">Créer mon compte</button>
        </form>

        <div class="divider"><span>ou</span></div>
        <button class="btn-google" id="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18">
            Continuer avec Google
        </button>

        <p class="switch-link">Déjà un compte ? <a href="login.html">Se connecter</a></p>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
