<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue — StockLedger</title>
    <link rel="icon" type="image/png" href="stockeledeger.png">
    <link rel="stylesheet" href="welcome.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="welcome-card">
        <img src="stockeledeger.png" alt="Logo StockLedger" class="logo">
        <div class="checkmark">
            <i class="fa-solid fa-check fa-xl"></i>
        </div>
        <h1>Bienvenue !</h1>
        <div class="welcome-name" id="welcome-name"></div>
        <div class="role-badge hidden" id="role-badge"></div>
        <p id="welcome-msg">Connexion réussie. Vous allez être redirigé vers votre espace…</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        <div class="redirect-msg" id="redirect-msg">Redirection dans 3 secondes…</div>
        <button class="btn-now" id="btn-now">
            Accéder maintenant
            <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <script type="module" src="welcome.js"></script>
</body>
</html>
